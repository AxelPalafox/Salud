<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VitalCheck App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary-bg: #0f172a; --accent-color: #38bdf8; --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #f1f5f9; padding-bottom: 80px; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .btn-neon { background: linear-gradient(135deg, #38bdf8, #2563eb); color: white; border: none; border-radius: 12px; padding: 15px; font-weight: 600; width: 100%; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0f172a; border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { text-align: center; color: #64748b; font-size: 0.75rem; cursor: pointer; flex: 1;}
        .nav-item.active { color: var(--accent-color); }
        .nav-item i { font-size: 1.2rem; display: block; margin-bottom: 3px; }
        .form-control, .form-select { background: rgba(255,255,255,0.05) !important; color: white !important; border: 1px solid var(--glass-border); border-radius: 10px; }
        
        /* Acordeón de Comida */
        .accordion-button { background-color: rgba(74, 222, 128, 0.1) !important; color: #4ade80 !important; font-weight: bold; border-radius: 10px !important; }
        .accordion-item { background: transparent; border: none; margin-bottom: 10px; }
        .accordion-body { background: rgba(0,0,0,0.2); border-radius: 0 0 10px 10px; color: #cbd5e1; white-space: pre-line; font-size: 0.9rem; }
        
        /* Rutinas Ilustradas */
        .ex-img { width: 50px; height: 50px; border-radius: 10px; background: white; padding: 5px; margin-right: 15px; }
    </style>
</head>
<body>

<div class="container mt-3" style="max-width: 480px;">
    
    <div id="auth-sections">
        <div id="login-section" class="glass-card mt-5">
            <h3 class="text-center mb-4">VitalCheck</h3>
            <input type="email" id="login-email" class="form-control mb-3" placeholder="Correo">
            <input type="password" id="login-pass" class="form-control mb-3" placeholder="Contraseña">
            <button class="btn-neon mb-3" onclick="login()">Entrar</button>
        </div>
    </div>

    <div id="main-app-section" class="d-none">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="fa-solid fa-leaf text-success me-2"></i>VitalCheck</h4>
            <button id="btn-install" class="btn btn-sm btn-outline-info d-none"><i class="fa-solid fa-download me-1"></i>Instalar App</button>
        </div>

        <div id="tab-chequeo">
            <div id="form-section" class="glass-card">
                <h5 class="text-warning">Energía</h5>
                <select id="energy-area" class="form-select mb-3"><option value="1">Baja</option><option value="2" selected>Media</option><option value="3">Alta</option></select>
                <h5 class="text-danger">Molestia</h5>
                <select id="pain-area" class="form-select mb-4"><option value="Ninguno">Todo bien</option><option value="Espalda">Espalda</option><option value="Piernas">Piernas</option></select>
                <button class="btn-neon" onclick="processChequeo()">GENERAR MI DÍA</button>
            </div>

            <div id="results-section" class="d-none">
                <h5 class="text-info mb-3"><i class="fa-solid fa-utensils me-2"></i>Tu Menú Hoy</h5>
                <div class="accordion" id="menuAccordion">
                    <div class="accordion-item">
                        <h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#colDesayuno" id="t-desayuno">Desayuno</button></h2>
                        <div id="colDesayuno" class="accordion-collapse collapse" data-bs-parent="#menuAccordion"><div class="accordion-body" id="b-desayuno"></div></div>
                    </div>
                    <div class="accordion-item">
                        <h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#colComida" id="t-comida">Comida</button></h2>
                        <div id="colComida" class="accordion-collapse collapse" data-bs-parent="#menuAccordion"><div class="accordion-body" id="b-comida"></div></div>
                    </div>
                    <div class="accordion-item">
                        <h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#colCena" id="t-cena">Cena</button></h2>
                        <div id="colCena" class="accordion-collapse collapse" data-bs-parent="#menuAccordion"><div class="accordion-body" id="b-cena"></div></div>
                    </div>
                </div>

                <h5 class="text-success mt-4 mb-3"><i class="fa-solid fa-dumbbell me-2"></i>Tu Rutina</h5>
                <div id="daily-exercise-list"></div>
                <button class="btn btn-outline-secondary w-100 mt-3" onclick="location.reload()">Regresar</button>
            </div>
        </div>

        <div id="tab-historial" class="d-none">
            <h4 class="mb-3 text-primary"><i class="fa-solid fa-calendar-week me-2"></i>Historial</h4>
            <div id="historial-list"></div>
        </div>

        <div id="tab-perfil" class="d-none">
            <h4 class="mb-3 text-success"><i class="fa-solid fa-user-gear me-2"></i>Mi Perfil</h4>
            <div class="glass-card">
                <label class="small text-muted">Mi Peso (kg)</label><input type="number" id="perf-weight" class="form-control mb-2">
                <label class="small text-muted">Objetivo Físico</label>
                <select id="perf-goal" class="form-select mb-3">
                    <option value="Mejorar salud general">Salud general</option>
                    <option value="Bajar de peso">Bajar de peso</option>
                    <option value="Ganar masa muscular">Ganar músculo</option>
                </select>
                <button class="btn btn-sm btn-info w-100 mb-4" onclick="updateProfile()">Guardar Cambios de Perfil</button>
                <hr style="border-color: rgba(255,255,255,0.1)">
                
                <h5 class="text-warning mt-3"><i class="fa-solid fa-bell me-2"></i>Recordatorios</h5>
                <button class="btn btn-sm btn-outline-warning w-100 mb-3" onclick="pedirPermisoNotificaciones()">Activar Notificaciones</button>
                <div class="row text-center mb-3">
                    <div class="col"><label class="small text-muted">Desayuno</label><input type="time" id="time-desayuno" class="form-control"></div>
                    <div class="col"><label class="small text-muted">Ejercicio</label><input type="time" id="time-rutina" class="form-control"></div>
                </div>
                <button class="btn btn-sm btn-warning w-100" onclick="guardarHorarios()">Guardar Horarios</button>
            </div>
            <button class="btn btn-outline-danger w-100 mt-2" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <div id="nav-bar" class="nav-bar d-none">
        <div class="nav-item active" onclick="switchTab('chequeo')"><i class="fa-solid fa-heart-pulse"></i>Día</div>
        <div class="nav-item" onclick="switchTab('historial')"><i class="fa-solid fa-calendar-days"></i>Historial</div>
        <div class="nav-item" onclick="switchTab('perfil')"><i class="fa-solid fa-user"></i>Perfil</div>
    </div>
    <div class="loader text-center d-none" id="global-loader" style="margin-top: 50px;"><div class="spinner-border text-info"></div></div>
</div>

<script>
    // ===============================================
    // ⚠️ REEMPLAZA ESTA URL CON TU SCRIPT NUEVO
    // ===============================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbwJb1pK4ZeixIPjYL8bPN-EqG79v9zqsZn60hxS_BBb4pu40zwZGFie3w5uLVr2EL7CRQ/exec';

    let currentUser = null;
    let deferredPrompt;

    // 1. INSTALACIÓN PWA
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        const btnInstall = document.getElementById('btn-install');
        btnInstall.classList.remove('d-none');
        btnInstall.addEventListener('click', () => {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => { btnInstall.classList.add('d-none'); deferredPrompt = null; });
        });
    });

    // 2. SISTEMA DE NOTIFICACIONES (HORARIOS)
    function pedirPermisoNotificaciones() {
        if (!("Notification" in window)) return alert("Tu navegador no soporta notificaciones.");
        Notification.requestPermission().then(p => { if(p === "granted") alert("¡Notificaciones activadas!"); });
    }
    
    function guardarHorarios() {
        const h = { desayuno: document.getElementById('time-desayuno').value, rutina: document.getElementById('time-rutina').value };
        localStorage.setItem('vitalcheck_horarios', JSON.stringify(h));
        alert("Horarios guardados. La app te avisará si la tienes abierta o en segundo plano.");
    }

    // Cronómetro interno que revisa la hora cada minuto
    setInterval(() => {
        const horarios = JSON.parse(localStorage.getItem('vitalcheck_horarios'));
        if(!horarios || Notification.permission !== "granted") return;
        const ahora = new Date();
        const horaActual = `${ahora.getHours().toString().padStart(2,'0')}:${ahora.getMinutes().toString().padStart(2,'0')}`;
        
        if(horaActual === horarios.desayuno) new Notification("VitalCheck", { body: "¡Es hora de tu desayuno saludable!", icon: "https://cdn-icons-png.flaticon.com/192/2966/2966334.png" });
        if(horaActual === horarios.rutina) new Notification("VitalCheck", { body: "¡Prepárate! Es hora de tu rutina de ejercicio.", icon: "https://cdn-icons-png.flaticon.com/192/2966/2966334.png" });
    }, 60000); // Revisa cada 60 segundos

    // INICIO APP
    window.onload = function() {
        const session = localStorage.getItem('vitalcheck_session');
        if (session) { currentUser = JSON.parse(session); initMainApp(); }
        
        const h = JSON.parse(localStorage.getItem('vitalcheck_horarios'));
        if(h) { document.getElementById('time-desayuno').value = h.desayuno; document.getElementById('time-rutina').value = h.rutina; }
    };

    function switchTab(tabId) {
        ['chequeo', 'historial', 'perfil'].forEach(t => document.getElementById('tab-' + t).classList.add('d-none'));
        document.getElementById('tab-' + tabId).classList.remove('d-none');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if(tabId === 'historial') loadHistorial();
    }

    function login() {
        const c = document.getElementById('login-email').value, p = document.getElementById('login-pass').value;
        if(!c || !p) return; document.getElementById('global-loader').classList.remove('d-none');
        enviarPeticion({ accion: 'login', correo: c, password: p }, data => {
            if(data.exito) { localStorage.setItem('vitalcheck_session', JSON.stringify(data.usuario)); currentUser = data.usuario; initMainApp(); }
            else { alert(data.mensaje); document.getElementById('global-loader').classList.add('d-none'); }
        });
    }

    function initMainApp() {
        document.getElementById('auth-sections').classList.add('d-none');
        document.getElementById('main-app-section').classList.remove('d-none');
        document.getElementById('nav-bar').classList.remove('d-none');
        document.getElementById('global-loader').classList.add('d-none');
        
        document.getElementById('perf-weight').value = currentUser.peso || "";
        document.getElementById('perf-goal').value = currentUser.objetivo || "Mejorar salud general";
    }

    // PROCESAR CHEQUEO CON MENÚS Y FOTOS
    function processChequeo() {
        document.getElementById('global-loader').classList.remove('d-none');
        enviarPeticion({ accion: 'chequeo', correoUsuario: currentUser.correo, energia: document.getElementById('energy-area').value, dolor: document.getElementById('pain-area').value, objetivo: currentUser.objetivo }, data => {
            document.getElementById('global-loader').classList.add('d-none');
            document.getElementById('form-section').classList.add('d-none');
            document.getElementById('results-section').classList.remove('d-none');
            
            // Llenar Acordeones de Menú
            document.getElementById('t-desayuno').innerText = data.menu.desayuno.titulo;
            document.getElementById('b-desayuno').innerText = data.menu.desayuno.pasos;
            document.getElementById('t-comida').innerText = data.menu.comida.titulo;
            document.getElementById('b-comida').innerText = data.menu.comida.pasos;
            document.getElementById('t-cena').innerText = data.menu.cena.titulo;
            document.getElementById('b-cena').innerText = data.menu.cena.pasos;

            // Llenar Rutina con Imágenes
            const container = document.getElementById('daily-exercise-list'); container.innerHTML = "";
            data.ejercicios.forEach(ex => {
                container.innerHTML += `
                <div class="glass-card d-flex align-items-center mb-2 p-2">
                    <img src="${ex.imagen}" class="ex-img">
                    <div><h6 class="mb-0">${ex.nombre}</h6><span class="small text-info">${ex.tiempo} segundos</span></div>
                </div>`;
            });
        });
    }

    // HISTORIAL Y PERFIL
    function loadHistorial() {
        const c = document.getElementById('historial-list'); c.innerHTML = "<div class='text-center'>Cargando...</div>";
        enviarPeticion({ accion: 'historial', correoUsuario: currentUser.correo }, data => {
            c.innerHTML = "";
            data.historial.forEach(h => { c.innerHTML += `<div class="glass-card p-3 mb-2 d-flex justify-content-between"><strong class="text-info">${h.fecha}</strong><span>Energía: ${h.energia}</span></div>`; });
        });
    }

    function updateProfile() {
        const peso = document.getElementById('perf-weight').value, obj = document.getElementById('perf-goal').value;
        enviarPeticion({ accion: 'actualizarPerfil', correoUsuario: currentUser.correo, peso: peso, objetivo: obj }, data => {
            if(data.exito) { currentUser.peso = peso; currentUser.objetivo = obj; localStorage.setItem('vitalcheck_session', JSON.stringify(currentUser)); alert("Perfil actualizado"); }
        });
    }

    function logout() { localStorage.removeItem('vitalcheck_session'); location.reload(); }
    function enviarPeticion(payload, cb) { fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(res => res.json()).then(cb); }
</script>
</body>
</html>
