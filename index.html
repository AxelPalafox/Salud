<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalCheck Ultra | Mi Salud</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary-bg: #0f172a; --accent-color: #38bdf8; --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Outfit', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a); color: #f1f5f9; min-height: 100vh; padding: 20px 0; }
        .app-container { max-width: 480px; margin: 0 auto; padding: 0 15px 80px 15px; }
        .header h1 { font-weight: 700; font-size: 2rem; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin:0;}
        .streak-badge { background: linear-gradient(45deg, #f97316, #ef4444); padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4); }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; margin-bottom: 20px; }
        .option-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .option-item { background: rgba(255,255,255,0.03); border: 1.5px solid var(--glass-border); border-radius: 15px; padding: 15px 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .option-item i { display: block; font-size: 1.5rem; margin-bottom: 8px; }
        .option-item.active { background: rgba(56, 189, 248, 0.2); border-color: var(--accent-color); transform: translateY(-3px); }
        .btn-neon { background: linear-gradient(135deg, #38bdf8, #2563eb); color: white; border: none; border-radius: 16px; padding: 16px; font-weight: 600; width: 100%; transition: 0.3s; }
        .exercise-card { background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)); border-radius: 20px; padding: 20px; margin-bottom: 15px; border-left: 4px solid var(--accent-color); }
        .btn-play { width: 40px; height: 40px; background: var(--accent-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary-bg); text-decoration: none; }
        .nav-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { text-align: center; color: #64748b; cursor: pointer; font-size: 0.75rem; transition: 0.3s; flex: 1; }
        .nav-item i { display: block; font-size: 1.3rem; margin-bottom: 3px; }
        .nav-item.active { color: var(--accent-color); }
        .form-control, .form-select { background-color: rgba(255,255,255,0.05) !important; border: 1px solid var(--glass-border) !important; color: white !important; border-radius: 12px; }
        
        /* Modulos Nuevos */
        .water-btn { width: 50px; height: 50px; border-radius: 50%; background: rgba(56, 189, 248, 0.2); border: 2px solid var(--accent-color); color: white; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .water-count { font-size: 4rem; font-weight: 700; color: var(--accent-color); margin: 0 30px; }
        .timer-display { font-size: 2.5rem; font-weight: bold; color: #fbbf24; text-align: center; margin-top: 10px; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="auth-sections">
        <div id="login-section" class="d-none">
            <div class="glass-card mt-5">
                <h4 class="mb-4 fw-bold text-center"><i class="fa-solid fa-user-lock me-2 text-info"></i>Iniciar Sesión</h4>
                <div class="mb-3"><input type="email" id="login-email" class="form-control" placeholder="Correo"></div>
                <div class="mb-4"><input type="password" id="login-pass" class="form-control" placeholder="Contraseña"></div>
                <button class="btn-neon mb-3" onclick="login()">INGRESAR</button>
                <p class="text-center small"><a href="#" onclick="showScreen('register')" class="text-info">Regístrate aquí</a></p>
            </div>
        </div>
        <div id="register-section" class="d-none">
            <div class="glass-card mt-5">
                <h4 class="mb-4 fw-bold text-center">Crear Cuenta</h4>
                <input type="text" id="reg-name" class="form-control mb-2" placeholder="Nombre">
                <input type="email" id="reg-email" class="form-control mb-2" placeholder="Correo">
                <input type="password" id="reg-pass" class="form-control mb-3" placeholder="Contraseña">
                <button class="btn-neon mb-3" onclick="register()">REGISTRARME</button>
                <p class="text-center small"><a href="#" onclick="showScreen('login')" class="text-info">Volver al Login</a></p>
            </div>
        </div>
    </div>

    <div id="main-app-section" class="d-none">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <p class="mb-0 text-uppercase small text-info" id="welcome-user">Hola</p>
                <div class="header"><h1>VitalCheck</h1></div>
            </div>
            <div class="streak-badge"><i class="fa-solid fa-fire text-warning"></i> <span id="streak-counter">0</span></div>
        </div>

        <div id="tab-chequeo">
            <div class="glass-card">
                <h5><i class="fa-solid fa-bolt text-warning me-2"></i>Energía</h5>
                <div class="option-grid">
                    <div class="option-item" data-val="1" onclick="selectOpt('energy', this)"><i class="fa-solid fa-battery-quarter"></i>Baja</div>
                    <div class="option-item active" data-val="2" onclick="selectOpt('energy', this)"><i class="fa-solid fa-battery-half"></i>Media</div>
                    <div class="option-item" data-val="3" onclick="selectOpt('energy', this)"><i class="fa-solid fa-battery-full"></i>Alta</div>
                </div>
                <h5 class="mt-4"><i class="fa-solid fa-hand-dots text-danger me-2"></i>Molestia</h5>
                <select id="pain-area" class="form-select mb-4">
                    <option value="Ninguno">Todo bien 👍</option>
                    <option value="Espalda">Espalda</option>
                    <option value="Piernas">Piernas</option>
                </select>
                <button class="btn-neon" onclick="processChequeo()">GENERAR MI RUTINA</button>
            </div>
            <div id="results-section" class="d-none">
                <h5 class="mb-3 text-success">Tu Rutina de Hoy</h5>
                <div id="daily-exercise-list"></div>
            </div>
        </div>

        <div id="tab-ejercicios" class="d-none">
            <h4 class="mb-3 fw-bold"><i class="fa-solid fa-dumbbell text-info me-2"></i>Mis Ejercicios</h4>
            <div id="all-exercises-list"></div>
        </div>

        <div id="tab-nutricion" class="d-none">
            <h4 class="mb-3 fw-bold"><i class="fa-solid fa-apple-whole text-success me-2"></i>Nutrición</h4>
            <div class="glass-card text-center">
                <h5 class="mb-4 text-info"><i class="fa-solid fa-droplet me-2"></i>Hidratación Diaria</h5>
                <div class="d-flex justify-content-center align-items-center mb-4">
                    <div class="water-btn" onclick="updateWater(-1)"><i class="fa-solid fa-minus"></i></div>
                    <div class="water-count" id="water-display">0</div>
                    <div class="water-btn" onclick="updateWater(1)"><i class="fa-solid fa-plus"></i></div>
                </div>
                <p class="text-muted small">Meta recomendada: 8 vasos al día</p>
            </div>
            <div class="glass-card">
                <h5 class="mb-3"><i class="fa-solid fa-utensils text-warning me-2"></i>¿Cómo comiste hoy?</h5>
                <select id="food-quality" class="form-select mb-4">
                    <option value="Excelente">🥗 Excelente (Balanceado)</option>
                    <option value="Regular">🍔 Regular (Hubo antojos)</option>
                    <option value="Mala">🍕 Mala (Pura chatarra)</option>
                </select>
                <button class="btn-neon" onclick="saveNutrition()">GUARDAR REGISTRO</button>
            </div>
        </div>

        <div id="tab-historial" class="d-none">
            <h4 class="mb-3 fw-bold"><i class="fa-solid fa-calendar-week text-primary me-2"></i>Historial</h4>
            <div id="historial-list"></div>
        </div>

        <div id="tab-perfil" class="d-none">
            <div class="glass-card text-center">
                <button class="btn btn-outline-danger w-100" onclick="logout()"><i class="fa-solid fa-power-off me-2"></i>Cerrar Sesión</button>
            </div>
        </div>

    </div>

    <div id="nav-bar" class="nav-bar d-none">
        <div class="nav-item active" onclick="switchTab('chequeo')"><i class="fa-solid fa-heart-pulse"></i>Chequeo</div>
        <div class="nav-item" onclick="switchTab('ejercicios')"><i class="fa-solid fa-dumbbell"></i>Ejercicios</div>
        <div class="nav-item" onclick="switchTab('nutricion')"><i class="fa-solid fa-apple-whole"></i>Nutrición</div>
        <div class="nav-item" onclick="switchTab('historial')"><i class="fa-solid fa-calendar-days"></i>Historial</div>
        <div class="nav-item" onclick="switchTab('perfil')"><i class="fa-solid fa-user"></i>Perfil</div>
    </div>

    <div class="loader text-info" id="global-loader"><div class="spinner-border"></div></div>

</div>

<script>
    // ========================================================
    // ⚠️ REEMPLAZA ESTA URL CON LA DE TU APPS SCRIPT NUEVO
    // ========================================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbz4_T5B0dW0qdirX_9WGNOKUn3DMMfv4rJ5AUQE73mT1W4i7yTx6C4vAaYRhw2ym5QrnA/exec';

    let selectedEnergy = 2;
    let currentUser = null;
    let waterCount = 0;
    let timers = {};

    window.onload = function() {
        const session = localStorage.getItem('vitalcheck_session');
        if (session) { currentUser = JSON.parse(session); initMainApp(); } 
        else { showScreen('login'); }
    };

    function showScreen(screenId) {
        document.getElementById('auth-sections').classList.add('d-none');
        document.getElementById('main-app-section').classList.add('d-none');
        document.getElementById('global-loader').style.display = 'none';
        if(screenId === 'login' || screenId === 'register') {
            document.getElementById('auth-sections').classList.remove('d-none');
            document.getElementById('login-section').classList.toggle('d-none', screenId !== 'login');
            document.getElementById('register-section').classList.toggle('d-none', screenId !== 'register');
        }
    }

    function switchTab(tabId) {
        ['chequeo', 'ejercicios', 'nutricion', 'historial', 'perfil'].forEach(t => document.getElementById('tab-' + t).classList.add('d-none'));
        document.getElementById('tab-' + tabId).classList.remove('d-none');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        event.currentTarget.classList.add('active');

        if(tabId === 'historial') loadHistorial();
        if(tabId === 'ejercicios') loadEjercicios();
    }

    function selectOpt(type, element) {
        element.parentElement.querySelectorAll('.option-item').forEach(opt => opt.classList.remove('active'));
        element.classList.add('active');
        selectedEnergy = element.getAttribute('data-val');
    }

    function login() {
        const correo = document.getElementById('login-email').value, password = document.getElementById('login-pass').value;
        if(!correo || !password) return; showLoader();
        enviarPeticion({ accion: 'login', correo, password }, data => {
            if(data.exito) { localStorage.setItem('vitalcheck_session', JSON.stringify(data.usuario)); currentUser = data.usuario; initMainApp(); }
            else { alert(data.mensaje); showScreen('login'); }
        });
    }

    function initMainApp() {
        showScreen('main-app');
        document.getElementById('main-app-section').classList.remove('d-none');
        document.getElementById('nav-bar').classList.remove('d-none');
        document.getElementById('welcome-user').innerText = `Hola, ${currentUser.nombre}`;
        
        // Cargar Historial ocultamente para sacar la racha
        enviarPeticion({ accion: 'historial', correoUsuario: currentUser.correo }, data => {
            if(data.exito) document.getElementById('streak-counter').innerText = data.racha || 0;
        });
    }

    /* === MÓDULO DE RUTINAS === */
    function processChequeo() {
        showLoader();
        enviarPeticion({ accion: 'chequeo', correoUsuario: currentUser.correo, energia: selectedEnergy, dolor: document.getElementById('pain-area').value }, data => {
            document.getElementById('global-loader').style.display = 'none';
            document.getElementById('results-section').classList.remove('d-none');
            renderExercises(data.ejercicios, 'daily-exercise-list');
        });
    }

    /* === MÓDULO DE EJERCICIOS Y CRONÓMETRO === */
    function loadEjercicios() {
        document.getElementById('all-exercises-list').innerHTML = "<div class='text-center'><i class='fa-solid fa-spinner fa-spin'></i></div>";
        enviarPeticion({ accion: 'obtenerEjerciciosTodo' }, data => {
            renderExercises(data.ejercicios, 'all-exercises-list');
        });
    }

    function renderExercises(lista, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        lista.forEach((ex, index) => {
            const uid = containerId + '-' + index;
            container.innerHTML += `
                <div class="exercise-card">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div><h6 class="mb-0 text-white fw-bold">${ex.nombre}</h6><span class="small text-info"><i class="fa-solid fa-tag me-1"></i>${ex.zona}</span></div>
                        ${ex.link ? `<a href="${ex.link}" target="_blank" class="btn-play"><i class="fa-solid fa-video"></i></a>` : ''}
                    </div>
                    <div id="timer-display-${uid}" class="timer-display d-none">00:${ex.tiempo < 10 ? '0'+ex.tiempo : ex.tiempo}</div>
                    <button id="btn-timer-${uid}" class="btn btn-sm btn-outline-warning w-100 mt-2" onclick="startTimer('${uid}', ${ex.tiempo})"><i class="fa-solid fa-stopwatch me-2"></i>Iniciar ${ex.tiempo}s</button>
                </div>`;
        });
    }

    function startTimer(uid, seconds) {
        if(timers[uid]) clearInterval(timers[uid]); // Detener si ya corría
        document.getElementById(`btn-timer-${uid}`).classList.add('d-none');
        const display = document.getElementById(`timer-display-${uid}`);
        display.classList.remove('d-none');
        
        let timeLeft = seconds;
        display.innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
        
        timers[uid] = setInterval(() => {
            timeLeft--;
            display.innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
            if(timeLeft <= 0) {
                clearInterval(timers[uid]);
                display.innerText = "¡TIEMPO!";
                display.classList.replace('text-warning', 'text-success');
                // Opcional: Reproducir un sonido de beep aquí si lo deseas
            }
        }, 1000);
    }

    /* === MÓDULO DE NUTRICIÓN === */
    function updateWater(val) {
        waterCount += val;
        if(waterCount < 0) waterCount = 0;
        document.getElementById('water-display').innerText = waterCount;
    }

    function saveNutrition() {
        showLoader();
        const comida = document.getElementById('food-quality').value;
        enviarPeticion({ accion: 'guardarNutricion', correoUsuario: currentUser.correo, agua: waterCount, comida: comida }, data => {
            document.getElementById('global-loader').style.display = 'none';
            alert(data.mensaje);
            waterCount = 0; document.getElementById('water-display').innerText = waterCount; // Reset visual
        });
    }

    /* === MÓDULO DE HISTORIAL === */
    function loadHistorial() {
        const container = document.getElementById('historial-list');
        container.innerHTML = "<div class='text-center'><i class='fa-solid fa-spinner fa-spin'></i></div>";
        enviarPeticion({ accion: 'historial', correoUsuario: currentUser.correo }, data => {
            container.innerHTML = "";
            data.historial.forEach(h => {
                container.innerHTML += `<div class="glass-card p-3 mb-2 d-flex justify-content-between align-items-center">
                    <div><strong class="text-info">${h.fecha}</strong><br><small class="text-muted">${h.dolor}</small></div>
                    <span class="badge bg-secondary">${h.energia}</span>
                </div>`;
            });
        });
    }

    function logout() { localStorage.removeItem('vitalcheck_session'); location.reload(); }
    function showLoader() { document.getElementById('global-loader').style.display = 'block'; }
    function enviarPeticion(payload, cb) {
        fetch(API_URL, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' }})
        .then(res => res.json()).then(cb).catch(() => { alert("Error de conexión"); document.getElementById('global-loader').style.display = 'none'; });
    }
</script>
</body>
</html>
